# GridSense — full stack (B.1 / B.2)
# Run:  docker compose up --build

services:
  # ── Time-series store: sensor readings (Cassandra, A.3) ───────────
  timeseries-db:
    image: cassandra:4.1
    container_name: gridsense_cassandra
    restart: unless-stopped
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: "GridSenseCluster"
      CASSANDRA_DC: "dc1"
      HEAP_NEWSIZE: "128M"
      MAX_HEAP_SIZE: "512M"
    volumes:
      - cassandra_data:/var/lib/cassandra
      # NOTE: the Cassandra image does not auto-run init scripts; the API
      # applies ./cql/init.cql on startup instead (see api/db/cassandra.py).
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q '^UN'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s   # Cassandra is slow to boot — don't gate too early

  # ── Graph store: network topology (Neo4j, A.4) ────────────────────
  graph-db:
    image: neo4j:5-community
    container_name: gridsense_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: "512M"
    volumes:
      - neo4j_data:/data
      - ./neo4j/import:/import
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:7474 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 30s

  # ── Document store: equipment metadata (MongoDB) ──────────────────
  catalog-db:
    image: mongo:7
    container_name: gridsense_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_USER}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD}"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  # ── Relational store: billing (PostgreSQL, ACID) ──────────────────
  billing-db:
    image: postgres:15
    container_name: gridsense_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s

  # ── Cache & Pub/Sub: dashboard + fault alerts (Redis) ─────────────
  cache:
    image: redis:7-alpine
    container_name: gridsense_redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}",
              "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 5s

  # ── REST gateway: all business logic (FastAPI) ────────────────────
  api:
    build: ./api
    container_name: gridsense_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CASSANDRA_HOSTS: "timeseries-db"
      NEO4J_URI: "bolt://graph-db:7687"
      MONGO_URI: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@catalog-db:27017"
      POSTGRES_DSN: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@billing-db:5432/${POSTGRES_DB}"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@cache:6379/0"
    volumes:
      - ./cql:/app/cql:ro             # API reads init.cql to bootstrap Cassandra
      - ./neo4j/import:/app/neo4j:ro  # API reads seed.cypher to seed the graph
    depends_on:
      timeseries-db:
        condition: service_healthy
      graph-db:
        condition: service_healthy
      catalog-db:
        condition: service_healthy
      billing-db:
        condition: service_healthy
      cache:
        condition: service_healthy

  # ── One-shot seeder: loads demo data, then exits (idempotent) ─────
  seed:
    build: ./api                      # reuse the API image (drivers already installed)
    container_name: gridsense_seed
    env_file:
      - .env
    environment:
      CASSANDRA_HOSTS: "timeseries-db"
      NEO4J_URI: "bolt://graph-db:7687"
      MONGO_URI: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@catalog-db:27017"
      POSTGRES_DSN: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@billing-db:5432/${POSTGRES_DB}"
    volumes:
      - ./scripts:/app/scripts:ro     # seed.py lives outside the API image's build context
      - ./neo4j/import:/app/neo4j:ro
    command: ["python", "scripts/seed.py"]
    restart: "no"                     # run once and stop
    depends_on:
      api:
        condition: service_started    # API applies init.cql before we seed Cassandra
      timeseries-db:
        condition: service_healthy
      graph-db:
        condition: service_healthy
      catalog-db:
        condition: service_healthy
      billing-db:
        condition: service_healthy

volumes:
  cassandra_data:
  neo4j_data:
  mongo_data:
  pg_data:
  redis_data:

networks:
  default:
    name: gridsense_net
